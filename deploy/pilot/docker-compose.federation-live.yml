# Infinity Pilot — multi-peer federation-live stack (Stage 19)
# Two independent AAIS substrates with cross-configured peer URLs.
version: "3.9"

services:
  platform-api:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform serve --host 0.0.0.0 --port 8090
    ports:
      - "8090:8090"
    environment:
      PLATFORM_DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      PLATFORM_REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  aais-alpha:
    build:
      context: ../..
      dockerfile: deploy/pilot/Dockerfile.aais
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      AAIS_RUNTIME_DIR: /app/.runtime/aais-alpha
      AAIS_OPERATOR_ORG_DOMAIN: operator-alpha.local
      AAIS_PEER_BASE_URLS: http://aais-beta:8000
      PLATFORM_API_BASE_URL: http://platform-api:8090
    volumes:
      - federation_alpha:/app/.runtime
    depends_on:
      - platform-api

  aais-beta:
    build:
      context: ../..
      dockerfile: deploy/pilot/Dockerfile.aais
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    environment:
      AAIS_RUNTIME_DIR: /app/.runtime/aais-beta
      AAIS_OPERATOR_ORG_DOMAIN: operator-beta.local
      AAIS_PEER_BASE_URLS: http://aais-alpha:8000
      PLATFORM_API_BASE_URL: http://platform-api:8090
    volumes:
      - federation_beta:/app/.runtime
    depends_on:
      - platform-api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - federation_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  federation_pg:
  federation_alpha:
  federation_beta:
